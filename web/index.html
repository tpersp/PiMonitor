<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PiMonitor Feed</title>
  <style>
    :root { color-scheme: dark; }
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      background: #111;
      color: #eee;
      display: flex;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .wrap {
      max-width: 96vw;
    }
    img, video {
      max-width: 96vw;
      max-height: 90vh;
      display: block;
      margin: 0 auto;
      border-radius: 8px;
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }
    .hint {
      opacity: .7;
      margin-top: .75rem;
      font-size: .9rem;
    }
    .stream-links {
      margin-top: 1rem;
      text-align: left;
      display: inline-block;
      max-width: 96vw;
    }
    .stream-links code {
      word-break: break-all;
    }
    a { color: #9cf; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>PiMonitor</h1>
    <div id="stream-container"></div>
    <p class="hint" id="hint"></p>
    <div class="stream-links" id="stream-links"></div>
    <p style="margin-top:1rem;"><a href="/config.html">Open configuration</a></p>
  </div>
  <script>
  // Fetch current configuration to determine how to display the stream
  fetch('/api/config')
    .then(function(res) { return res.json(); })
    .then(function(cfg) {
      var container = document.getElementById('stream-container');
      var hint = document.getElementById('hint');
      var links = document.getElementById('stream-links');
      var host = window.location.hostname;
      var siteHost = window.location.host;
      if (cfg.STREAM_MODE === 'MJPEG') {
        var img = document.createElement('img');
        img.src = '/stream';
        img.alt = 'Live stream';
        container.appendChild(img);
        links.innerHTML = '<p>Direct MJPEG URL: <code>http://' + host + ':' + cfg.HTTP_PORT + '/stream</code></p>';
      } else {
        var rtspUrl = 'rtsp://' + host + ':' + cfg.RTSP_PORT + '/stream';
        hint.textContent = 'Use VLC, ffplay, or another RTSP viewer from your PC to open the live feed.';
        links.innerHTML = '<p>RTSP URL: <code>' + rtspUrl + '</code></p>';
        if (cfg.ENABLE_HLS === '1') {
          var video = document.createElement('video');
          video.controls = true;
          video.autoplay = true;
          video.muted = true;
          video.playsInline = true;
          video.src = '/hls/unicast.m3u8';
          container.appendChild(video);
          links.innerHTML += '<p>Browser HLS URL: <code>http://' + siteHost + '/hls/unicast.m3u8</code></p>';
        }
      }
    })
    .catch(function() {
      var hint = document.getElementById('hint');
      hint.textContent = 'Unable to load configuration.';
    });
  </script>
</body>
</html>
